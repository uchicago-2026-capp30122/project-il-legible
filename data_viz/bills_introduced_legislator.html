</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-429e110c4f3a10593c856269db044d60"}, "mark": {"type": "bar", "color": "maroon"}, "encoding": {"x": {"axis": {"labelAngle": 0}, "field": "names", "title": "Legislator", "type": "nominal"}, "y": {"field": "num_bills", "title": "Number of Bills Introduced", "type": "quantitative"}}, "height": 400, "title": "Bills Introduced in 102nd & 103rd Sessions", "width": 300, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-429e110c4f3a10593c856269db044d60": [{"names": "Median", "num_bills": 57.0}, {"names": "Omar Aquino", "num_bills": 69.0}]}};

{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col">
        <table id="sponsors-table" class="table table-striped">
            <thead class="thead-light">
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Name</th>
                    <th scope="col">Organization Classification</th>
                    <th scope="col">Total Donation Count</th>
                    <th scope="col">Average Donation Amount</th>
                    <th scope="col">Total Bills Sponsored</th>
                    <th scope="col">Percentage of Bills Passed</th>
                    <th scope="col">Effectiveness Score</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='js/sponsor_table.js') }}"></script> 
{% endblock %}

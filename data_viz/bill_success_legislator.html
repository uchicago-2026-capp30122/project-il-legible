<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.1.0"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-ef06446b27ae145fc135c7d1174f4e10"}, "mark": {"type": "arc", "color": "maroon", "outerRadius": 100}, "encoding": {"color": {"field": "Legend", "legend": {"labelFontSize": 18, "titleFontSize": 18}, "scale": {"domain": ["Passed", "Failed"], "range": ["#062F8E", "#7C7C7C"]}, "type": "nominal"}, "theta": {"field": "num_bills", "type": "quantitative"}}, "height": 250, "title": "Bill Passage", "width": 200, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-ef06446b27ae145fc135c7d1174f4e10": [{"Legend": "Passed", "num_bills": 0.072463768115942}, {"Legend": "Failed", "num_bills": 0.927536231884058}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
